{% extends "core/base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header">
        <h5 class="mb-0">{{ titulo }}</h5>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">{{ botao|default:"Salvar" }}</button>
            {% if cancel_url_name %}
                <a href="{% url cancel_url_name %}" class="btn btn-outline-secondary">Cancelar</a>
            {% else %}
                <a href="{% url 'cliente_list' %}" class="btn btn-outline-secondary">Cancelar</a>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
