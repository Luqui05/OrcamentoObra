{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}OrcamentoObra{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --oo-bg: #eef2f7;
        --oo-surface: #ffffff;
        --oo-ink: #111827;
        --oo-muted: #6b7280;
        --oo-brand-900: #0f172a;
        --oo-brand-700: #1e293b;
        --oo-success: #198754;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: radial-gradient(circle at top right, #e2e8f0 0%, var(--oo-bg) 40%, #f8fafc 100%);
        color: var(--oo-ink);
      }

      .navbar {
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.08);
      }

      .hero-shell {
        background: linear-gradient(135deg, var(--oo-brand-900) 0%, var(--oo-brand-700) 55%, #334155 100%);
        color: #fff;
      }

      .diagram-card {
        border-radius: 0.9rem;
        overflow: hidden;
      }

      .diagram-card .card-img-top {
        height: 250px;
        object-fit: contain;
        object-position: center;
        background: #f3f4f6;
        padding: 0.75rem;
      }

      .diagram-card .card-title {
        color: #111827;
      }

      .diagram-card .card-text {
        color: var(--oo-muted);
      }

      .btn-success {
        background-color: var(--oo-success);
        border-color: var(--oo-success);
      }

      .lightbox-modal .modal-dialog {
        max-width: 100vw;
        margin: 0;
      }

      .lightbox-modal .modal-content {
        min-height: 100vh;
        border: 0;
        border-radius: 0;
        background: rgba(2, 6, 23, 0.94);
      }

      .lightbox-modal .modal-header {
        border-bottom: 0;
      }

      .lightbox-modal .modal-title {
        color: #e5e7eb;
      }

      .lightbox-modal .btn-close {
        filter: invert(1) grayscale(100%) brightness(200%);
      }

      .lightbox-modal .modal-body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .lightbox-modal .modal-body img {
        max-height: 85vh;
        max-width: 96vw;
        object-fit: contain;
        border-radius: 0.75rem;
      }

      footer {
        background: var(--oo-surface);
      }
    </style>
  </head>
  <body class="sb-nav-fixed">
    <nav class="navbar navbar-expand navbar-dark bg-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" href="{% url 'sobre' %}">OrcamentoObra</a>

        <div class="ms-auto d-flex align-items-center gap-2">
          <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
          <a class="btn btn-warning btn-sm" href="{% url 'cadastro_usuario' %}">Cadastro</a>
        </div>
      </div>
    </nav>

    <main class="container-fluid px-4 py-4">
      {% block content %}{% endblock %}
    </main>

    <footer class="py-4 mt-auto border-top">
      <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between small text-muted">
          <div>OrcamentoObra</div>
          <div>Sistema academico de gestao de obras e orcamentos</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
