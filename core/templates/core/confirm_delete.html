{% extends "core/base.html" %}

{% block title %}Excluir cliente{% endblock %}

{% block content %}
<div class="card border-danger shadow-sm">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0">{{ titulo|default:"Excluir" }}</h5>
    </div>
    <div class="card-body">
        <p>Tem certeza que deseja excluir <strong>{{ object }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Excluir</button>
            {% if cancel_url_name %}
                <a href="{% url cancel_url_name %}" class="btn btn-outline-secondary">Cancelar</a>
            {% else %}
                <a href="{% url 'cliente_list' %}" class="btn btn-outline-secondary">Cancelar</a>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
