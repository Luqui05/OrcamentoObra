<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header"><h3 class="text-center fw-light my-4">Login</h3></div>
                            <div class="card-body">
                                <form method="post">
                                    {% csrf_token %}

                                    {% if form.non_field_errors %}
                                        <div class="alert alert-danger" role="alert">
                                            {{ form.non_field_errors }}
                                        </div>
                                    {% endif %}

                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="id_username" name="username" type="text" placeholder="Usuário" required>
                                        <label for="id_username">Usuário</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="id_password" name="password" type="password" placeholder="Senha" required>
                                        <label for="id_password">Senha</label>
                                    </div>

                                    <div class="d-grid mt-4 mb-0">
                                        <button class="btn btn-primary" type="submit">Entrar</button>
                                    </div>
                                </form>
                            </div>
                            <div class="card-footer text-center py-3">
                                <div class="small"><a href="{% url 'cadastro_usuario' %}">Precisa de conta? Cadastre-se</a></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
