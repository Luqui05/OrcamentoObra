<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar | OrcamentoObra</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 60%, #334155 100%);
      }

      .auth-wrap {
        min-height: 100vh;
      }

      .auth-card {
        border: 0;
        border-radius: 1rem;
      }

      .auth-subtitle {
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main class="container auth-wrap d-flex align-items-center justify-content-center py-4">
      <div class="row justify-content-center w-100">
        <div class="col-lg-5 col-md-8">
          <div class="text-center text-white mb-3">
            <h1 class="h4 mb-1">OrcamentoObra</h1>
            <p class="small mb-0">Acesse sua conta para continuar</p>
          </div>

          <div class="card auth-card shadow-lg">
            <div class="card-header bg-white border-0 pt-4 pb-1">
            </div>
            <div class="card-body p-4">
              <form method="post">
                {% csrf_token %}

                {% if form.non_field_errors %}
                  <div class="alert alert-danger" role="alert">
                    {{ form.non_field_errors }}
                  </div>
                {% endif %}

                {% if next %}
                  <input type="hidden" name="next" value="{{ next }}" />
                {% endif %}

                <div class="form-floating mb-3">
                  <input class="form-control" id="id_username" name="username" type="text" placeholder="Usuario" required autofocus>
                  <label for="id_username">Usuario</label>
                </div>

                <div class="form-floating mb-3">
                  <input class="form-control" id="id_password" name="password" type="password" placeholder="Senha" required>
                  <label for="id_password">Senha</label>
                </div>

                <div class="d-grid mt-4">
                  <button class="btn btn-primary" type="submit">Entrar</button>
                </div>
              </form>
            </div>
            <div class="card-footer bg-white text-center py-3">
              <div class="small">
                <a href="{% url 'cadastro_usuario' %}">Nao tem conta? Cadastre-se</a>
                <span class="mx-2 text-muted">|</span>
                <a href="{% url 'sobre' %}">Voltar para inicio</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
